<!doctype html>
<html>
  <head>
    <title>Sistem Informasi Kependudukan</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f4f6f9;
      }
      .navbar-brand {
        font-weight: bold;
      }
      .logout-icon {
        width: 32px;
        height: 32px;
        cursor: pointer;
        transition: transform 0.2s ease;
      }
      .logout-icon:hover {
        transform: scale(1.1);
      }
    </style>
  </head>

  <body>
    <!-- Navbar dengan logo + ikon logout -->
    <nav class="navbar navbar-dark bg-primary">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand">Sistem Informasi Kependudukan</span>
        <!-- Logo Logout -->
        <img
          src="https://www.freeiconspng.com/thumbs/sign-out-icon/sign-out-icon-3.png"
          alt="Logout"
          class="logout-icon"
          id="logoutBtn"
        />
      </div>
    </nav>

    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-body text-center">
          <h2>Selamat Datang</h2>
          <p>Selamat datang di Aplikasi Sistem Informasi Kependudukan.</p>

          <a href="data.php" class="btn btn-success">Tambah Data</a>
          <a href="tampil.php" class="btn btn-primary">Lihat Data</a>
        </div>
      </div>
    </div>

    <script>
      // Konfirmasi sebelum logout
      document
        .getElementById("logoutBtn")
        .addEventListener("click", function () {
          if (confirm("Are you sure wanna exit this site?")) {
            window.location.href = "Login.html";
          }
        });
    </script>
  </body>
</html>

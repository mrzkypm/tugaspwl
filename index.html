<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <title>Login Sistem Kependudukan</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      width: 800px;
      height: 500px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: fadeIn 1s ease;
    }

    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, #2a5298, #1e3c72);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      text-align: center;
    }

    .left-panel h1 {
      margin-bottom: 20px;
    }

    .left-panel p {
      font-size: 14px;
      line-height: 1.5;
    }

    .right-panel {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right-panel h2 {
      margin-bottom: 20px;
      color: #2a5298;
    }

    .right-panel input,
    .right-panel select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
      transition: 0.3s;
    }

    .right-panel input:focus,
    .right-panel select:focus {
      border-color: #2a5298;
      box-shadow: 0 0 8px #2a5298;
      outline: none;
    }

    .right-panel button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .right-panel button:hover {
      transform: scale(1.05);
    }

    .error {
      animation: shake 0.3s;
      border: 2px solid red !important;
    }

    .success {
      border: 2px solid green !important;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {
      0% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      50% {
        transform: translateX(5px);
      }

      75% {
        transform: translateX(-5px);
      }

      100% {
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Panel Kiri -->
    <div class="left-panel">
      <h1>🏛️ Sistem Kependudukan</h1>
      <p>
        Selamat datang di portal resmi Sistem Kependudukan. Silakan login
        menggunakan NIK dan akun yang telah terdaftar untuk mengakses data
        kependudukan.
      </p>
    </div>

    <!-- Panel Kanan -->
    <div class="right-panel">
      <h2>Login Admin/Petugas</h2>
      <form id="loginForm">
        <input type="text" id="nik" placeholder="Masukkan NIK" required />
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <select id="role" required>
          <option value="">-- Pilih Role --</option>
          <option value="Admin">Admin</option>
          <option value="Petugas">Petugas</option>
        </select>
        <button type="submit">Login</button>
      </form>
      <p id="message"></p>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const nik = document.getElementById("nik");
    const user = document.getElementById("username");
    const pass = document.getElementById("password");
    const role = document.getElementById("role");
    const msg = document.getElementById("message");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      if (
        nik.value === "202343502173" &&
        user.value === "Admin" &&
        pass.value === "111120" &&
        role.value === "Admin"
      ) {
        msg.textContent = "✅ Login Berhasil! Redirecting...";
        msg.style.color = "green";
        nik.classList.add("success");
        user.classList.add("success");
        pass.classList.add("success");
        role.classList.add("success");
        setTimeout(() => {
          window.location.href = "Dashboard.html";
        }, 1000);
      } else {
        msg.textContent = "❌ Data login tidak valid!";
        msg.style.color = "red";
        nik.classList.add("error");
        user.classList.add("error");
        pass.classList.add("error");
        role.classList.add("error");
        setTimeout(() => {
          nik.classList.remove("error");
          user.classList.remove("error");
          pass.classList.remove("error");
          role.classList.remove("error");
        }, 500);
      }
    });
  </script>
</body>

</html>
